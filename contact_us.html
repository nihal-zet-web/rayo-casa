<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />

<body>
	<header>Prisma Residences</header>		
	<nav>
		<a class="navBar-element" href="">HOME</a>
		<a class="navBar-element" href="">PROPERTIES</a>
		<a class="navBar-element" href="">SELL WITH US</a>
		<a class="navBar-element" href="">ABOUT US</a>
	</nav>
	<main>
	<section> 
		<form method="post" action="">
            <h1>CONTACT US</h1>
            <label for="name">Name</label>
            <input type="text" id="name" value="name" name="name" required>
            <label for="lastname">Lastname</label>
            <input type="text" id="lastname" value="lastname" name="lastname">
            <label type="email" for="email">Email</label>
            <input id="email" value="email" name="email" required>
            <label type="text" for="phone-number">Phone number</label>
            <input id="phone-number" value="phone-number" name="phone-number">
            <label for="message">Message</label>
            <textarea id="message" value="message" name="message" placeholder="Write something..."></textarea>
            <input type="submit" value="Submit">
        </form>
	</section>

	</section>
	</main>

	</footer>
